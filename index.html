<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div id="s"></div>
    <div id="text"></div>
</body>
<style>
    body {
        height: 1000px;
        width: 100%;
    }

    #s {
        display: block;
        height: 100px;
        width: 100px;
        background-color: brown;
        color: aqua;
    }
</style>
<script>
    let x = 0;
    let y = 0;
    let text = document.getElementById("text")
    text.innerText = `x=${x} y=${y}`
    addEventListener('mousedown', function (event) {
        let flag = true
        event.preventDefault()
        let start_x = event.pageX || event.clientX
        let start_y = event.pageY || event.clientY
        addEventListener('mousemove', function (move_event) {
            if (flag) {
                let end_y = move_event.pageY || move_event.clientY
                let end_x = move_event.pageX || move_event.clientX
                // 重新计算旋转角度
                x = x + (end_y - start_y) * 0.2
                y = y + (end_x - start_x) * 0.2
                text.innerText = `end_y - start_y=${end_y - start_y} end_x - start_x=${end_x - start_x}`
                document.getElementById('s').style.transform = `rotateX(${x}deg) rotateY(${y}deg)`
                start_x = end_x
                start_y = end_y
            }
        })
        addEventListener('mouseup', function (up_event) {
            flag = false;
        })
    })
</script>

</html>
